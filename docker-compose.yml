version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: portfolios-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - portfolios-net

  redis:
    image: redis:7.2-alpine
    container_name: portfolios-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - portfolios-net

  backend:
    build:
      context: ./Portfolios-Templates-BE
      dockerfile: Dockerfile
    container_name: portfolios-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/portfolios_template
      MONGODB_DATABASE: portfolios_template
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ChangeMeToAtLeast32CharactersForHS256SigningKey
      JWT_ACCESS_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: Lax
      AUTH_COOKIE_REFRESH_PATH: /api/auth/refresh
      AUTH_COOKIE_REFRESH_MAX_AGE_SECONDS: 604800
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      OTP_EXPIRATION_MS: 300000
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      AWS_S3_BUCKET_NAME: ""
      AWS_S3_REGION: us-east-1
      AWS_S3_ACCESS_KEY: ""
      AWS_S3_SECRET_KEY: ""
    networks:
      - portfolios-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: portfolios-redis-commander
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - portfolios-net

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: portfolios-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
    networks:
      - portfolios-net

volumes:
  mongodb_data:
  redis_data:

networks:
  portfolios-net:
