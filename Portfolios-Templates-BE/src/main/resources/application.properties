spring.application.name=Portfolios-Templates-BE

# MongoDB (Atlas)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}

# Redis â náº¿u cÃ³ REDIS_URL (Upstash rediss//default...@host6379) thÃ¬ host/port/password bÃªn dÆ°á»i bá» bá» qua
spring.data.redis.url=${REDIS_URL}
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL}
# Chá» dÃ¹ng RedisTemplate cho auth â khÃ´ng dÃ¹ng Redis repository â táº¯t quÃ©t repo trÃ¡nh log âCould not safely identifyâ¦â
spring.data.redis.repositories.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_ACCESS_EXPIRATION_MS}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS}

# --- Email ---
# SMTP SendGrid
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
app.mail.from=${MAIL_FROM}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Debug OTP trong log (Render) APP_MAIL_LOG_OTP=true â chá» báº­t táº¡m
app.mail.log-otp=${APP_MAIL_LOG_OTP}

# AWS S3
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.region=${AWS_S3_REGION}
aws.s3.access-key=${AWS_S3_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY}

# Auth Cookie/CORS â FE Vite http//localhost3000
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
auth.cookie.secure=${AUTH_COOKIE_SECURE}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE}
auth.cookie.refresh.path=${AUTH_COOKIE_REFRESH_PATH}
auth.cookie.refresh.max-age-seconds=${AUTH_COOKIE_REFRESH_MAX_AGE_SECONDS}

# Server â Render injects PORT; local default 8080
server.port=${PORT}

# OTP
otp.expiration=${OTP_EXPIRATION_MS}
